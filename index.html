<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix GitHub AI Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* THIS WAS THE BUG. Set to transparent so the rain can actually be seen! */
            background-color: transparent; 
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
        }

        .terminal-container {
            position: relative;
            z-index: 10; 
            background-color: rgba(0, 0, 0, 0.85);
            border: 3px solid #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
            width: 90%;
            max-width: 700px;
            padding: 35px;
            border-radius: 8px;
        }

        .mute-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 10px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .mute-btn:hover {
            background: #00ff00;
            color: #000;
        }

        h1 { font-size: 2.2rem; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; }
        p { font-size: 1.05rem; margin-bottom: 15px; color: #00ff00; }
        
        .input-group { display: flex; gap: 15px; margin-bottom: 25px; width: 100%; }
        
        input {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 12px 15px;
            font-size: 1.1rem;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }

        button.execute-btn {
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        button.execute-btn:hover {
            background-color: #000;
            color: #00ff00;
            border: 2px solid #00ff00;
        }

        h3 { font-size: 1.2rem; margin-bottom: 15px; letter-spacing: 1px; }

        #results {
            border: 2px dashed #00ff00;
            background-color: rgba(0, 0, 0, 0.9);
            padding: 20px;
            min-height: 180px;
            max-height: 250px;
            overflow-y: auto;
            font-size: 1.05rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="terminal-container">
        <button id="muteBtn" onclick="toggleMute()" class="mute-btn">🔊 ON</button>
        <h1>[ SYSTEM: AI_TEK_FINDER ]</h1>
        <p>>_ Enter target technology query to search the GitHub database...</p>
        
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Construct query... e.g., neural network">
            <button onclick="searchTech()" class="execute-btn">EXECUTE</button>
        </div>

        <h3>[ TERMINAL OUTPUT ]</h3>
        <div id="results">SYSTEM READY. AWAITING INPUT...</div>
    </div>

    <script>
        // --- SOUND ENGINE ---
        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            if (isMuted) {
                btn.innerText = "🔇 OFF";
                btn.style.color = "#ef4444"; 
                btn.style.borderColor = "#ef4444";
            } else {
                btn.innerText = "🔊 ON";
                btn.style.color = "#00ff00"; 
                btn.style.borderColor = "#00ff00";
                playBeep(600, 'square', 100); 
            }
        }

        function playBeep(freq, type, duration) {
            if (isMuted) return; 
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type; 
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => { oscillator.stop(); audioCtx.close(); }, duration);
            } catch(e) {}
        }

        // --- SEARCH ENGINE ---
        function searchTech() {
            const query = document.getElementById('userInput').value;
            const resultsDiv = document.getElementById('results');
            
            if(!query) {
                playBeep(200, 'sawtooth', 300);
                alert("ERROR: Input query is empty.");
                return;
            }
            
            playBeep(400, 'square', 150);
            resultsDiv.innerHTML = "<span style='color: #00ff00;'>[!] WARNING: Accessing GitHub API...</span><br><span>[i] Analyzing request...</span><br><span>[i] Deploying AI Agent...</span>";

            fetch(`https://ai-tek-finder.onrender.com/search?query=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    playBeep(800, 'sine', 200);
                    resultsDiv.innerHTML = data.results;
                })
                .catch(error => {
                    playBeep(200, 'sawtooth', 400);
                    resultsDiv.innerHTML = "<span style='color: red;'>[-] ERROR: Connection failed.</span>";
                });
        }

        // --- MATRIX RAIN ENGINE ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { canvas.height = window.innerHeight; canvas.width = window.innerWidth; }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);
        
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = [];
        for (let x = 0; x < columns; x++) { drops[x] = Math.random() * -100; }
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00'; 
            ctx.font = `bold ${fontSize}px Courier New`;
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
