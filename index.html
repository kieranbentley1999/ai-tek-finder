<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEKFINDER Terminal | $TEKFIND</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000; 
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; 
        }

        .terminal-container {
            position: relative;
            z-index: 10; 
            background-color: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ff00; 
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.3);
            width: 90%;
            max-width: 700px;
            padding: 35px 30px;
        }

        .corner {
            position: absolute;
            color: #00ff00;
            font-size: 1.2rem;
            line-height: 1;
            background: #000;
        }
        .c-tl { top: -9px; left: -6px; padding: 0 4px; }
        .c-tr { top: -9px; right: -6px; padding: 0 4px; }
        .c-bl { bottom: -9px; left: -6px; padding: 0 4px; }
        .c-br { bottom: -9px; right: -6px; padding: 0 4px; }

        h1 { 
            font-size: 1.8rem; 
            font-weight: bold; 
            margin-bottom: 5px; 
            letter-spacing: 2px; 
            text-shadow: 0 0 8px #00ff00;
        }
        
        .subtitle {
            color: #00ff00;
            opacity: 0.7;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        p { font-size: 1rem; margin-bottom: 15px; color: #00ff00; opacity: 0.8; }
        
        .search-wrapper { margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; width: 100%; margin-bottom: 15px;}
        
        input {
            flex: 1;
            background-color: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px 15px;
            font-size: 1.1rem;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }
        input::placeholder { color: rgba(0, 255, 0, 0.4); }

        button.execute-btn {
            background-color: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        button.execute-btn:hover { background-color: #00ff00; color: #000; }

        h3 { font-size: 1.1rem; margin: 25px 0 15px 0; letter-spacing: 1px; }

        #results {
            border: 1px dashed rgba(0, 255, 0, 0.5);
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px;
            min-height: 150px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .mute-btn {
            position: absolute;
            bottom: -45px;
            right: 0;
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 10px;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .mute-btn:hover { background: #00ff00; color: #000; }
        
        .nav-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #000;
            background: #00ff00;
            padding: 5px 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #00ff00;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: #000;
            color: #00ff00;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="terminal-container">
        <span class="corner c-tl">+</span>
        <span class="corner c-tr">+</span>
        <span class="corner c-bl">+</span>
        <span class="corner c-br">+</span>

        <a href="about.html" class="nav-btn">[ READ SYSTEM DOCS ]</a>

        <h1>> TEKFINDER v1.0 <span class="cursor">_</span></h1>
        <div class="subtitle">SCANNING THE OPEN SOURCE MAINFRAME FOR UNDERGROUND TECH</div>
        
        <div class="search-wrapper">
            <div class="input-group">
                <input type="text" id="userInput" placeholder="agent://prompt">
                <button onclick="searchTech()" class="execute-btn">[ SEARCH ]</button>
            </div>
        </div>

        <h3>[ TERMINAL OUTPUT ]</h3>
        <div id="results">SYSTEM READY. AWAITING INPUT...</div>

        <button id="muteBtn" onclick="toggleMute()" class="mute-btn">[ SOUND: ON ]</button>
    </div>

    <script>
        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted;
            const btn = document.getElementById('muteBtn');
            if (isMuted) {
                btn.innerText = "[ SOUND: OFF ]";
                btn.style.color = "#ef4444"; 
                btn.style.borderColor = "#ef4444";
            } else {
                btn.innerText = "[ SOUND: ON ]";
                btn.style.color = "#00ff00"; 
                btn.style.borderColor = "#00ff00";
                playBeep(600, 'square', 100); 
            }
        }

        function playBeep(freq, type, duration) {
            if (isMuted) return; 
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = type; 
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                setTimeout(() => { oscillator.stop(); audioCtx.close(); }, duration);
            } catch(e) {}
        }

        function searchTech() {
            const query = document.getElementById('userInput').value;
            const resultsDiv = document.getElementById('results');
            
            if(!query) {
                playBeep(200, 'sawtooth', 300);
                resultsDiv.innerHTML = "<span style='color: red;'>[-] ERROR: Input query is empty.</span>";
                return;
            }
            
            playBeep(400, 'square', 150);
            resultsDiv.innerHTML = "<span style='color: #00ff00;'>[+] INITIATING PROTOCOL...</span><br><span>[+] Parsing intent...</span><br><span>[+] Accessing GitHub Mainframe...</span>";

            fetch(`https://ai-tek-finder.onrender.com/search?query=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    playBeep(800, 'sine', 200);
                    resultsDiv.innerHTML = data.results;
                })
                .catch(error => {
                    playBeep(200, 'sawtooth', 400);
                    resultsDiv.innerHTML = "<span style='color: red;'>[-] FATAL ERROR: Backend disconnected. Check terminal.</span>";
                });
        }

        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() { canvas.height = window.innerHeight; canvas.width = window.innerWidth; }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);
        
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = [];
        for (let x = 0; x < columns; x++) { drops[x] = 1; }
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00'; 
            ctx.font = `bold ${fontSize}px Courier New`;
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) { drops[i] = 0; }
                drops[i]++;
            }
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
