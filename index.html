<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix GitHub AI Terminal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Keeps it visible in the background */
        }

        .terminal-container {
            position: relative;
            z-index: 2; /* Keeps the box in front of the rain */
            background-color: rgba(0, 0, 0, 0.85);
            border: 3px solid #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
            width: 90%;
            max-width: 650px;
            padding: 35px;
            border-radius: 8px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.05rem;
            margin-bottom: 15px;
            color: #00ff00;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
        }

        input {
            flex: 1;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 12px 15px;
            font-size: 1.1rem;
            font-family: 'Courier New', Courier, monospace;
            outline: none;
        }

        button {
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        button:hover {
            background-color: #000;
            color: #00ff00;
            border: 2px solid #00ff00;
        }

        h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #results {
            border: 2px dashed #00ff00;
            background-color: rgba(0, 0, 0, 0.9);
            padding: 20px;
            min-height: 180px;
            max-height: 250px;
            overflow-y: auto;
            font-size: 1.05rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="terminal-container">
        <h1>[ SYSTEM: AI_TEK_FINDER ]</h1>
        <p>>_ Enter target technology query to search the GitHub database...</p>
        
        <div class="input-group">
            <input type="text" id="userInput" placeholder="ai game">
            <button onclick="searchTech()">EXECUTE</button>
        </div>

        <h3>[ TERMINAL OUTPUT ]</h3>
        <div id="results">SYSTEM READY. AWAITING INPUT...</div>
    </div>

    <script>
        function searchTech() {
            const query = document.getElementById('userInput').value;
            const resultsDiv = document.getElementById('results');
            
            if(!query) {
                alert("ERROR: Input query is empty.");
                return;
            }
            
            resultsDiv.innerHTML = `
                <span style="color: #00ff00;">[!] WARNING: Accessing GitHub API...</span><br>
                <span style="color: #00ff00;">[i] Analyzing request: "${query}"</span><br>
                <span style="color: #00ff00;">[i] Deploying AI Agent into the Matrix...</span>
            `;

            fetch(`https://ai-tek-finder.onrender.com/search?query=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    resultsDiv.innerHTML = data.results;
                })
                .catch(error => {
                    resultsDiv.innerHTML = "<span style='color: #ef4444;'>[-] ERROR: Could not connect to the cloud core backend.</span>";
                });
        }

        // --- MATRIX BACKGROUND ENGINE ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function setCanvasSize() {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        // Using standard alphanumeric characters to prevent browser glitching
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100; 
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff00'; 
            ctx.font = `bold ${fontSize}px Courier New`;

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 35);
    </script>
</body>
</html>
