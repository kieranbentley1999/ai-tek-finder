<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Code Language Translator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000; color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .terminal-container {
            position: relative; z-index: 10; 
            background-color: rgba(0, 0, 0, 0.85); border: 1px solid #00ff00; 
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.3); width: 95%; max-width: 900px; padding: 35px 30px;
        }
        .corner {
            position: absolute; color: #00ff00; font-size: 1.2rem; line-height: 1; background: #000;
        }
        .c-tl { top: -9px; left: -6px; padding: 0 4px; }
        .c-tr { top: -9px; right: -6px; padding: 0 4px; }
        .c-bl { bottom: -9px; left: -6px; padding: 0 4px; }
        .c-br { bottom: -9px; right: -6px; padding: 0 4px; }
        
        h1 { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
        .back-link { display: inline-block; color: #00ff00; text-decoration: none; border: 1px solid #00ff00; padding: 4px 10px; font-size: 0.8rem; margin-bottom: 20px; font-weight: bold; }
        .back-link:hover { background: #00ff00; color: #000; }

        /* Workspace Layout */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .panel-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-label {
            font-size: 0.85rem;
            color: #fff;
            text-shadow: 0 0 5px #00ff00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 220px;
            background-color: rgba(0, 15, 0, 0.6);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            outline: none;
            resize: none;
        }

        .output-box {
            width: 100%;
            height: 220px;
            background-color: rgba(0, 0, 0, 0.6);
            border: 1px dashed rgba(0, 255, 0, 0.5);
            color: #00ff00;
            padding: 12px;
            font-size: 0.85rem;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        select, button.action-btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 10px 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
        }
        select option { background: #000; color: #00ff00; }
        button.action-btn:hover { background: #00ff00; color: #000; }

        @media (max-width: 768px) {
            body { overflow-y: auto; align-items: flex-start; padding: 15px; }
            .terminal-container { width: calc(100% - 10px); margin: 15px auto; padding: 20px 15px; }
            h1 { font-size: 1.3rem; }
            .workspace-grid { grid-template-columns: 1fr; }
            .control-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div class="terminal-container">
        <span class="corner c-tl">+</span>
        <span class="corner c-tr">+</span>
        <span class="corner c-bl">+</span>
        <span class="corner c-br">+</span>
        <a href="index.html" class="back-link"><< BACK TO HUB</a>
        <h1>> CODE LANGUAGE TRANSLATOR _</h1>
        <br>

        <!-- CONTROLS BAR -->
        <div class="control-bar">
            <div>
                <label for="targetLang">TARGET ENVIRONMENT:</label>
                <select id="targetLang">
                    <option value="javascript">JavaScript (Node/Browser)</option>
                    <option value="typescript">TypeScript</option>
                    <option value="rust">Rust</option>
                    <option value="go">Go (Golang)</option>
                </select>
            </div>
            <button onclick="executeTranslation()" class="action-btn">[ RUN TRANSLATION ENGINE ]</button>
        </div>

        <!-- DUAL PANEL WORKSPACE -->
        <div class="workspace-grid">
            <div class="panel-box">
                <span class="panel-label">[ INPUT SOURCE SNIPPET ]</span>
                <textarea id="sourceCode" placeholder="Paste raw code here (e.g. Python function)..."></textarea>
            </div>
            <div class="panel-box">
                <span class="panel-label">[ TRANSLATED MATRIX OUTPUT ]</span>
                <div id="outputCode" class="output-box">AWAITING AST COMPILATION PARAMETERS...</div>
            </div>
        </div>
    </div>

    <script>
        async function executeTranslation() {
            const code = document.getElementById('sourceCode').value.trim();
            const target = document.getElementById('targetLang').value;
            const outputBox = document.getElementById('outputCode');

            if (!code) {
                outputBox.innerHTML = "<span style='color: yellow;'>[!] Please paste a code snippet in the input box first.</span>";
                return;
            }

            outputBox.innerHTML = `<span>[+] ALLOCATING RE-COMPILATION SANDBOX...</span><br><span>[+] CONVERTING AST NODES TO ${target.toUpperCase()}...</span>`;

            try {
                const response = await fetch("https://ai-tek-finder.onrender.com/translate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code: code, target: target })
                });

                const data = await response.json();
                if (data.translated_code) {
                    outputBox.innerText = data.translated_code;
                } else {
                    outputBox.innerHTML = "<span style='color: red;'>[-] Translation pipeline error.</span>";
                }
            } catch (err) {
                outputBox.innerHTML = "<span style='color: red;'>[-] SERVER DISCONNECTED. Please retry in a few seconds.</span>";
            }
        }

        // Matrix background setup
        const canvas = document.getElementById('matrixCanvas'); const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
        let drops = Array(Math.floor(canvas.width / 16)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff00'; ctx.font = 'bold 16px Courier New';
            drops.forEach((y, i) => {
                ctx.fillText(letters[Math.floor(Math.random() * letters.length)], i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
            });
        }
        setInterval(draw, 35);

        // Silent Traffic Tracker
        fetch("https://ai-tek-finder.onrender.com/api/track", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ page: "translate.html" })
        }).catch(err => console.log("Tracker silent fail"));
    </script>
</body>
</html>
